<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sermon Notes Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Caveat+Brush&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper:      #f5f0e8;
      --paper-dark: #ede6d6;
      --paper-card: #faf7f0;
      --ink:        #2a1a1a;
      --ink-light:  #5c3d3d;
      --burgundy:   #7a1c2e;
      --burgundy-l: #a0324a;
      --sepia:      #c4a882;
      --sepia-l:    #ddd0b8;
      --rule:       #c8b89a;
      --shadow:     rgba(80,40,20,.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8e0d0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,130,.18) 28px);
      font-family: 'Crimson Text', serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ══ LOADING SCREEN ══ */
    #loadingScreen {
      position: fixed; inset: 0;
      background: #2a1a14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; gap: 16px;
      transition: opacity .4s;
    }
    #loadingScreen .cross { font-size: 3rem; color: var(--sepia); }
    #loadingScreen p { font-family: 'Caveat', cursive; font-size: 1.2rem; color: #c4a882; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(196,168,130,.2);
      border-top-color: var(--sepia);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ HEADER ══ */
    header {
      background: var(--ink);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 3px 14px rgba(0,0,0,.4);
    }
    .logo { font-family: 'Caveat', cursive; font-size: 1.7rem; font-weight: 700; color: var(--sepia); letter-spacing: .03em; line-height: 1; }
    .logo span { color: var(--burgundy-l); }
    .logo-sub { font-family: 'Crimson Text', serif; font-size: .72rem; color: #8a7a6a; letter-spacing: .12em; text-transform: uppercase; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .sync-status { font-family: 'Caveat', cursive; font-size: .85rem; color: #8a7a6a; display: flex; align-items: center; gap: 5px; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #5a8a5a; }
    .sync-dot.syncing { background: #c08030; animation: pulse .8s infinite; }
    .sync-dot.offline { background: #8a4040; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .btn-new { background: var(--burgundy); color: #f5ede0; border: none; padding: 9px 20px; border-radius: 4px; font-family: 'Caveat', cursive; font-size: 1.05rem; cursor: pointer; transition: background .2s; letter-spacing: .04em; }
    .btn-new:hover { background: var(--burgundy-l); }

    /* ══ LAYOUT ══ */
    .app { display: flex; height: calc(100vh - 61px); }

    /* ══ SIDEBAR ══ */
    aside { width: 250px; min-width: 200px; background: #2a1a14; display: flex; flex-direction: column; border-right: 2px solid #3d2a20; overflow: hidden; }
    .sidebar-label { font-family: 'Caveat', cursive; font-size: .85rem; color: #8a7060; letter-spacing: .1em; text-transform: uppercase; padding: 14px 16px 6px; }
    .sidebar-search input { width: calc(100% - 24px); margin: 0 12px 8px; background: rgba(255,255,255,.06); border: 1px solid #5a3a2a; border-radius: 4px; color: #d5c5b0; padding: 7px 10px; font-family: 'Caveat', cursive; font-size: .95rem; outline: none; }
    .sidebar-search input::placeholder { color: #6a5040; }
    .sidebar-search input:focus { border-color: var(--sepia); }
    .note-list { overflow-y: auto; flex: 1; }
    .note-list::-webkit-scrollbar { width: 3px; }
    .note-list::-webkit-scrollbar-thumb { background: #5a3a2a; }
    .note-item { padding: 11px 16px 9px; cursor: pointer; border-left: 3px solid transparent; transition: background .15s, border-color .15s; position: relative; border-bottom: 1px solid rgba(255,255,255,.04); }
    .note-item:hover { background: rgba(255,255,255,.05); }
    .note-item.active { background: rgba(196,168,130,.12); border-left-color: var(--sepia); }
    .note-item-title { font-family: 'Caveat', cursive; font-size: 1rem; color: #e0cdb0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 28px; }
    .note-item-meta { font-size: .72rem; color: #8a7060; margin-top: 2px; font-family: 'Crimson Text', serif; }
    
    
    .note-item-del { position: absolute; top: 50%; right: 10px; transform: translateY(-50%); background: rgba(122,28,46,.15); border: none; color: #a07060; cursor: pointer; font-size: .75rem; border-radius: 4px; padding: 3px 7px; transition: background .2s, color .2s; } .note-item-del:hover { background: var(--burgundy); color: #f5ede0; }
    .sidebar-empty { padding: 28px 16px; text-align: center; color: #6a5040; font-family: 'Caveat', cursive; font-size: .95rem; line-height: 1.7; }

    /* ══ MAIN ══ */
    main { flex: 1; overflow-y: auto; background: transparent; }
    main::-webkit-scrollbar { width: 5px; }
    main::-webkit-scrollbar-thumb { background: var(--sepia-l); border-radius: 3px; }
    .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9a8870; gap: 14px; }
    .empty-state .cross { font-family: 'Caveat Brush', cursive; font-size: 4rem; color: var(--sepia); opacity: .5; }
    .empty-state p { font-family: 'Caveat', cursive; font-size: 1.1rem; text-align: center; line-height: 1.7; }

    /* ══ JOURNAL PAGE ══ */
    .journal-page { max-width: 820px; margin: 0 auto; padding: 28px 28px 60px; }
    .page-top { background: var(--paper-card); border: 1.5px solid var(--rule); border-radius: 4px 4px 0 0; padding: 16px 20px 12px; box-shadow: 0 2px 8px var(--shadow); position: relative; }
    .page-top::before { content: 'SERMON NOTES'; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-family: 'Caveat', cursive; font-size: .75rem; color: var(--sepia); letter-spacing: .2em; background: var(--paper-card); padding: 0 10px; }
    .page-top-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-top: 8px; }
    .field-label { font-family: 'Caveat', cursive; font-size: .72rem; color: var(--sepia); letter-spacing: .12em; text-transform: uppercase; display: block; margin-bottom: 2px; }
    .hw-input { font-family: 'Caveat', cursive; font-size: 1.15rem; font-weight: 500; color: var(--burgundy); background: transparent; border: none; border-bottom: 1.5px solid var(--rule); outline: none; width: 100%; padding: 2px 4px; transition: border-color .2s; line-height: 1.3; }
    .hw-input:focus { border-bottom-color: var(--burgundy); }
    .hw-input::placeholder { color: #c4b090; }
    .field-date { width: 130px; }
    .field-loc { flex: 1; min-width: 130px; }
    .field-preach { flex: 1; min-width: 120px; }
    .title-input { font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700; color: var(--ink); background: transparent; border: none; outline: none; width: 100%; padding: 4px 0 2px; line-height: 1.2; border-bottom: 2px dashed var(--rule); margin: 8px 0 14px; }
    .title-input::placeholder { color: #c8b898; }
    .scripture-strip { background: var(--paper-dark); border: 1.5px solid var(--rule); border-top: none; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
    .section-tag { font-family: 'Caveat', cursive; font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: var(--sepia); white-space: nowrap; }
    .scripture-input { font-family: 'Caveat', cursive; font-size: 1.15rem; font-style: italic; color: var(--burgundy); background: transparent; border: none; border-bottom: 1px dashed var(--rule); outline: none; flex: 1; padding: 2px 4px; }
    .scripture-input::placeholder { color: #c4aa80; }
    .scripture-input:focus { border-bottom-color: var(--burgundy); }
    .section-grid { display: grid; grid-template-columns: 1fr; gap: 0; border: 1.5px solid var(--rule); border-top: none; }
    .section-box { background: var(--paper-card); border: 1px solid var(--rule); padding: 18px 20px 20px; position: relative; background-image: repeating-linear-gradient(to bottom, transparent, transparent 28px, rgba(196,168,130,.25) 29px); background-position: 0 38px; }
    .section-box-title { font-family: 'Caveat', cursive; font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--sepia); display: inline-block; background: var(--paper-card); padding: 0 6px; position: absolute; top: -8px; left: 14px; }
    .hw-area { font-family: 'Caveat', cursive; font-size: 1.25rem; line-height: 1.9; color: var(--burgundy); background: transparent; border: none; outline: none; resize: none; width: 100%; min-height: 200px; padding: 8px 2px 0; }
    .hw-area::placeholder { color: #c4aa80; font-style: italic; }
    .hw-area.notes-area { min-height: 150px; }
    .notes-strip { background: var(--paper); border: 1.5px solid var(--rule); border-top: none; border-radius: 0 0 4px 4px; padding: 14px 20px 18px; position: relative; box-shadow: 0 3px 10px var(--shadow); background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, rgba(196,168,130,.22) 28px); }
    .notes-strip-title { font-family: 'Caveat', cursive; font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--sepia); display: inline-block; background: var(--paper); padding: 0 6px; position: absolute; top: -8px; left: 14px; }
    .save-bar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 6px 0 12px; }
    .save-dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; transition: background .3s; }
    .save-dot.saved { background: #5a8a5a; }
    .save-dot.unsaved { background: #c08030; animation: pulse .8s infinite; }
    .save-txt { font-family: 'Caveat', cursive; font-size: .85rem; color: #9a8870; }

    /* ══ MODAL ══ */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(20,10,5,.65); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--paper-card); border: 2px solid var(--rule); border-radius: 6px; padding: 28px 28px 22px; width: 400px; max-width: 95vw; box-shadow: 0 10px 40px rgba(0,0,0,.4); position: relative; }
    .modal::before { content: '✝'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--paper-card); padding: 0 10px; font-size: 1.2rem; color: var(--burgundy); }
    .modal h3 { font-family: 'Caveat', cursive; font-size: 1.5rem; color: var(--burgundy); margin-bottom: 18px; text-align: center; letter-spacing: .04em; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { font-family: 'Caveat', cursive; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; color: var(--sepia); display: block; margin-bottom: 4px; }
    .modal-field input { width: 100%; font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--burgundy); background: transparent; border: none; border-bottom: 1.5px solid var(--rule); outline: none; padding: 4px 6px; transition: border-color .2s; }
    .modal-field input:focus { border-bottom-color: var(--burgundy); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel { padding: 7px 16px; background: none; border: 1.5px solid var(--rule); border-radius: 4px; cursor: pointer; font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink-light); }
    .btn-create { padding: 7px 20px; background: var(--burgundy); color: #f5ede0; border: none; border-radius: 4px; cursor: pointer; font-family: 'Caveat', cursive; font-size: 1.05rem; }
    .btn-create:hover { background: var(--burgundy-l); }

    @media (max-width: 680px) { .journal-page { padding: 16px 12px 50px; } }
    @media (max-width: 480px) { aside { width: 180px; min-width: 0; } .logo { font-size: 1.35rem; } }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="cross">✝</div>
  <div class="spinner"></div>
  <p>Loading your journal...</p>
</div>

<header>
  <div>
    <div class="logo">Sermon <span>Notes</span></div>
    <div class="logo-sub">My Personal Journal</div>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Synced</span>
    </div>
    <button class="btn-new" onclick="openModal()">+ New Entry</button>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sidebar-label">My Entries</div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search notes..." oninput="renderList()" />
    </div>
    <div class="note-list" id="noteList">
      <div class="sidebar-empty">Loading...</div>
    </div>
  </aside>
  <main id="mainArea">
    <div class="empty-state">
      <div class="cross">✝</div>
      <p>Select an entry or create<br/>a new one to get started.</p>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>New Sermon Entry</h3>
    <div class="modal-field"><label>Sermon Title</label><input type="text" id="m-title" placeholder="e.g. Walking in Faith" /></div>
    <div class="modal-field"><label>Date</label><input type="date" id="m-date" /></div>
    <div class="modal-field"><label>Church / Service</label><input type="text" id="m-church" placeholder="e.g. Sunday Morning Service" /></div>
    <div class="modal-field"><label>Location</label><input type="text" id="m-loc" placeholder="e.g. Main Sanctuary" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" onclick="createNote()">Create Entry</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, doc,
    onSnapshot, setDoc, deleteDoc,
    query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Firebase config ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDu0i91Av9z156CPEYCg1MI_QQ4VZ2H_5A",
    authDomain: "sermon-note-7701b.firebaseapp.com",
    projectId: "sermon-note-7701b",
    storageBucket: "sermon-note-7701b.firebasestorage.app",
    messagingSenderId: "126024933265",
    appId: "1:126024933265:web:7df2803ef1ab7867378430",
    measurementId: "G-Y5QK7HZLNZ"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const col  = collection(db, "sermonNotes");

  // ── State ─────────────────────────────────────────────────────
  let notes    = [];
  let activeId = null;
  let saveTimer = null;

  // ── Sync indicator ────────────────────────────────────────────
  function setSyncStatus(state) {
    const dot   = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    if (state === 'synced')  { dot.className = 'sync-dot';          label.textContent = 'Synced'; }
    if (state === 'syncing') { dot.className = 'sync-dot syncing';  label.textContent = 'Saving...'; }
    if (state === 'offline') { dot.className = 'sync-dot offline';  label.textContent = 'Offline'; }
  }

  // ── Real-time listener ────────────────────────────────────────
  const q = query(col, orderBy("createdAt", "desc"));
  onSnapshot(q,
    snapshot => {
      notes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList();
      // hide loading screen
      const ls = document.getElementById('loadingScreen');
      if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 400); }
      // restore active note if open
      if (activeId) {
        const stillExists = notes.find(n => n.id === activeId);
        if (stillExists) refreshActiveFields(stillExists);
      } else if (notes.length) {
        openNote(notes[0].id);
      }
      setSyncStatus('synced');
    },
    err => {
      console.error(err);
      setSyncStatus('offline');
      document.getElementById('loadingScreen')?.remove();
    }
  );

  // ── Save to Firestore ─────────────────────────────────────────
  async function saveNote(n) {
    setSyncStatus('syncing');
    try {
      await setDoc(doc(db, "sermonNotes", n.id), n);
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('offline');
    }
  }

  function autoSave(n) {
    const dot = document.getElementById('saveDot');
    if (dot) dot.className = 'save-dot unsaved';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      await saveNote(n);
      const dot2 = document.getElementById('saveDot');
      if (dot2) dot2.className = 'save-dot saved';
    }, 800);
  }

  // ── Helpers ───────────────────────────────────────────────────
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(date) {
    if (!date) return '';
    const [y,m,d] = date.split('-');
    return `${m}/${d}/${y}`;
  }

  // ── Modal ─────────────────────────────────────────────────────
  window.openModal = () => {
    document.getElementById('m-title').value = '';
    document.getElementById('m-date').value  = new Date().toISOString().slice(0,10);
    document.getElementById('m-church').value = '';
    document.getElementById('m-loc').value   = '';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('m-title').focus(), 80);
  };
  window.closeModal = () => document.getElementById('modal').classList.remove('open');
  document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') window.closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });

  window.createNote = async () => {
    const n = {
      id:          Date.now().toString(),
      title:       document.getElementById('m-title').value.trim()  || 'Untitled Sermon',
      date:        document.getElementById('m-date').value          || new Date().toISOString().slice(0,10),
      church:      document.getElementById('m-church').value.trim(),
      location:    document.getElementById('m-loc').value.trim(),
      preacher: '', scripture: '',
      summary: '', questions: '', application: '', reflection: '', notes: '',
      createdAt:   new Date().toISOString()
    };
    window.closeModal();
    await saveNote(n);       // Firestore에 저장 → onSnapshot이 목록 자동 업데이트
    activeId = n.id;
  };

  // ── Render sidebar ────────────────────────────────────────────
  function renderList() {
    const q2 = (document.getElementById('searchInput')?.value||'').toLowerCase();
    const filtered = notes.filter(n =>
      n.title.toLowerCase().includes(q2) ||
      (n.church||'').toLowerCase().includes(q2) ||
      (n.scripture||'').toLowerCase().includes(q2) ||
      (n.preacher||'').toLowerCase().includes(q2)
    );
    const el = document.getElementById('noteList');
    if (!filtered.length) {
      el.innerHTML = `<div class="sidebar-empty">${q2 ? 'No results found.' : 'No entries yet.'}</div>`;
      return;
    }
    el.innerHTML = filtered.map(n => `
      <div class="note-item ${n.id === activeId ? 'active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-item-title">${esc(n.title)}</div>
        <div class="note-item-meta">${fmt(n.date)} · ${esc(n.church||'Journal')}</div>
        <button class="note-item-del" onclick="delNote(event,'${n.id}')">✕</button>
      </div>
    `).join('');
  }
  window.renderList = renderList;

  // ── Open note (full render) ───────────────────────────────────
  window.openNote = (id) => {
    activeId = id;
    const n = notes.find(x => x.id === id);
    if (!n) return;
    renderList();

    document.getElementById('mainArea').innerHTML = `
      <div class="journal-page">
        <div class="save-bar">
          <span class="save-dot saved" id="saveDot"></span>
          <span class="save-txt" id="saveTxt">All changes saved to cloud ☁️</span>
        </div>
        <div class="page-top">
          <div class="page-top-row">
            <div class="field-date">
              <span class="field-label">Date</span>
              <input class="hw-input" id="f-date" type="date" value="${esc(n.date)}" oninput="upd('date',this.value)" />
            </div>
            <div class="field-preach">
              <span class="field-label">Preacher</span>
              <input class="hw-input" id="f-preacher" type="text" placeholder="Pastor's name" value="${esc(n.preacher)}" oninput="upd('preacher',this.value)" />
            </div>
            <div class="field-loc">
              <span class="field-label">Location</span>
              <input class="hw-input" id="f-location" type="text" placeholder="e.g. Beach House" value="${esc(n.location)}" oninput="upd('location',this.value)" />
            </div>
            <div class="field-loc">
              <span class="field-label">Church / Service</span>
              <input class="hw-input" id="f-church" type="text" placeholder="Sunday Morning" value="${esc(n.church)}" oninput="upd('church',this.value)" />
            </div>
          </div>
          <input class="title-input" id="f-title" type="text" placeholder="Sermon title..." value="${esc(n.title)}" oninput="upd('title',this.value)" />
        </div>
        <div class="scripture-strip">
          <span class="section-tag">Scripture</span>
          <input class="scripture-input" id="f-scripture" type="text"
            placeholder='e.g. Philippians 4:13 — "I can do all things through Christ who strengthens me."'
            value="${esc(n.scripture)}" oninput="upd('scripture',this.value)" />
        </div>
        <div class="section-grid">
          <div class="section-box">
            <span class="section-box-title">Summary</span>
            <textarea class="hw-area" id="f-summary" placeholder="Main message of the sermon..." oninput="upd('summary',this.value)">${esc(n.summary)}</textarea>
          </div>
          <div class="section-box">
            <span class="section-box-title">Questions</span>
            <textarea class="hw-area" id="f-questions" placeholder="1) What challenged me?&#10;2) What do I want to explore more?&#10;3) What does this mean for my life?" oninput="upd('questions',this.value)">${esc(n.questions)}</textarea>
          </div>
          <div class="section-box">
            <span class="section-box-title">Application to Life</span>
            <textarea class="hw-area" id="f-application" placeholder="How will I live this out this week..." oninput="upd('application',this.value)">${esc(n.application)}</textarea>
          </div>
          <div class="section-box">
            <span class="section-box-title">Reflection</span>
            <textarea class="hw-area" id="f-reflection" placeholder="Lord, thank you for..." oninput="upd('reflection',this.value)">${esc(n.reflection)}</textarea>
          </div>
        </div>
        <div class="notes-strip">
          <span class="notes-strip-title">Notes</span>
          <textarea class="hw-area notes-area" id="f-notes" style="width:100%;padding-top:10px;"
            placeholder="• Key verses &#10;• Quotes &#10;• Anything that stood out..."
            oninput="upd('notes',this.value)">${esc(n.notes)}</textarea>
        </div>
      </div>`;
  };

  // Refresh only field values (when Firestore updates while editing)
  function refreshActiveFields(n) {
    const fields = ['date','preacher','location','church','title','scripture','summary','questions','application','reflection','notes'];
    fields.forEach(f => {
      const el = document.getElementById('f-' + f);
      if (el && document.activeElement !== el) {
        el.tagName === 'TEXTAREA' ? el.value = n[f]||'' : el.value = n[f]||'';
      }
    });
  }

  // ── Update field ──────────────────────────────────────────────
  window.upd = (key, val) => {
    const n = notes.find(x => x.id === activeId);
    if (!n) return;
    n[key] = val;
    autoSave(n);
  };

  // ── Delete ────────────────────────────────────────────────────
  window.delNote = async (e, id) => {
    e.stopPropagation();
    if (!confirm('Delete this entry?')) return;
    await deleteDoc(doc(db, "sermonNotes", id));
    if (activeId === id) {
      activeId = null;
      document.getElementById('mainArea').innerHTML = `
        <div class="empty-state">
          <div class="cross">✝</div>
          <p>Select an entry or create<br/>a new one to get started.</p>
        </div>`;
    }
  };
</script>
</body>
</html>
